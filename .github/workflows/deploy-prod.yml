# .github/workflows/deploy-prod.yml

name: Deploy to production

on:
  push:
    branches: [main]          # triggers when dev → main PR is merged

jobs:
  build-and-push-prod:
    name: Build and push prod image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push prod image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod      # lean multi-stage prod Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/docker-learn-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/docker-learn-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max