# .github/workflows/deploy-dev.yml

name: Deploy to dev

on:
  push:
    branches: [dev]           # triggers when PR is merged into dev

jobs:
  build-and-push-dev:
    name: Build and push dev image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push dev image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile           # dev Dockerfile (with nodemon etc)
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/docker-learn-backend:dev
            ${{ secrets.DOCKER_USERNAME }}/docker-learn-backend:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max