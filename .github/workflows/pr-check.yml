# .github/workflows/pr-check.yml

name: PR checks

on:
  pull_request:
    branches: [dev, main]

jobs:
  test:
    name: Run tests          # ← matches branch protection rule exactly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test --if-present

  docker-build-check:
    name: Build and push Docker image   # ← matches branch protection rule exactly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build dev image (verify Dockerfile works)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max