# .github/workflows/docker.yml  (backend repo)

name: Build and Push Backend

# Trigger: runs on every push to main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]   # also runs on PRs so you catch broken builds early

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'           # caches node_modules between runs — faster CI

      # 3. Install and test
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present   # won't fail if no test script exists yet

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test                  # only runs if tests pass
    if: github.ref == 'refs/heads/main'   # only push image on main, not PRs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 4. Log in to Docker Hub using your GitHub secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 5. Set up Docker Buildx — enables advanced build features + caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6. Build and push the production image
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod          # use the lean multi-stage Dockerfile
          push: true
          # Two tags: one with the git commit SHA (for rollbacks), one as latest
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/docker-learn-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/docker-learn-backend:${{ github.sha }}
          # Cache layers between builds — dramatically speeds up CI
          cache-from: type=gha
          cache-to: type=gha,mode=max